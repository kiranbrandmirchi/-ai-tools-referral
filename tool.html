<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool Details — AI Tools Findr</title>
  <meta name="description" content="Detailed review, pricing, and referral link for this AI tool.">
  <link rel="canonical" href="https://aitoolsfindr.com/tool.html">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
    .container{max-width:900px;margin:0 auto;padding:24px 16px}
    .back{display:inline-block;color:#818cf8;text-decoration:none;margin-bottom:20px;font-size:14px}
    .back:hover{text-decoration:underline}
    .tool-header{display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .tool-icon{font-size:56px}
    .tool-title h1{font-size:28px;color:#fff}
    .tool-title .cat{color:#818cf8;font-size:14px;margin-top:4px}
    .badges{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .badge{padding:4px 12px;border-radius:20px;font-size:12px;background:#1e1e2e;border:1px solid #333}
    .badge.featured{background:#312e81;border-color:#818cf8;color:#c7d2fe}
    .badge.pricing{background:#064e3b;border-color:#34d399;color:#a7f3d0}
    .desc-section{background:#111118;border-radius:12px;padding:24px;margin-bottom:20px;border:1px solid #1e1e2e;line-height:1.7}
    .desc-section h2{font-size:18px;color:#818cf8;margin-bottom:12px}
    .video-section{margin-bottom:20px}
    .video-section iframe{width:100%;aspect-ratio:16/9;border:none;border-radius:12px}
    .cta-buttons{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
    .btn{padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:600;font-size:15px;display:inline-block;transition:transform .2s}
    .btn:hover{transform:translateY(-2px)}
    .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
    .btn-secondary{background:#1e1e2e;color:#e0e0e0;border:1px solid #333}
    .ad-slot{background:#111118;border:1px dashed #333;border-radius:8px;padding:16px;margin-bottom:20px;text-align:center;min-height:90px;display:flex;align-items:center;justify-content:center;color:#555;font-size:13px}
    .loading{text-align:center;padding:80px 20px;color:#818cf8;font-size:18px}
    .error-msg{text-align:center;padding:80px 20px;color:#f87171;font-size:16px}
    footer{text-align:center;padding:32px 16px;color:#555;font-size:13px;border-top:1px solid #1e1e2e;margin-top:40px}
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← Back to All Tools</a>
    <div id="content"><div class="loading">Loading tool details...</div></div>
    <div id="ad-detail" class="ad-slot" style="display:none;"></div>
  </div>
  <footer>© 2026 AI Tools Findr. All rights reserved.<br>This site contains referral links. We may earn a commission at no extra cost to you.</footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const toolId = params.get('id');
    const content = document.getElementById('content');

    if (!toolId) {
      content.innerHTML = '<div class="error-msg">No tool ID specified. <a href="/" style="color:#818cf8">Go back</a></div>';
    } else {
      loadTool();
      loadAd();
    }

    async function loadTool() {
      try {
        const res = await fetch('/.netlify/functions/get-tool?id=' + toolId);
        if (!res.ok) throw new Error('Tool not found');
        const t = await res.json();
        if (t.error) throw new Error(t.error);

        document.title = t.name + ' — AI Tools Findr';
        const meta = document.querySelector('meta[name="description"]');
        if (meta) meta.content = t.short_description || t.description;

        let videoHTML = '';
        if (t.video_url) {
          let embedUrl = t.video_url;
          const ytMatch = t.video_url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&]+)/);
          if (ytMatch) embedUrl = 'https://www.youtube.com/embed/' + ytMatch[1];
          videoHTML = '<div class="video-section"><h2>Video Overview</h2><br><iframe src="' + embedUrl + '" allowfullscreen loading="lazy"></iframe></div>';
        }

        const longDesc = t.long_description || t.description || '';

        content.innerHTML =
          '<div class="tool-header">' +
            '<span class="tool-icon">' + (t.icon_emoji || '🔧') + '</span>' +
            '<div class="tool-title"><h1>' + t.name + '</h1><div class="cat">' + t.category + '</div></div>' +
          '</div>' +
          '<div class="badges">' +
            (t.is_featured ? '<span class="badge featured">⭐ Featured</span>' : '') +
            '<span class="badge pricing">' + (t.pricing || 'Freemium') + '</span>' +
          '</div>' +
          '<div class="cta-buttons">' +
            '<a href="' + t.referral_link + '" target="_blank" rel="noopener" class="btn btn-primary">Get ' + t.name + ' →</a>' +
            (t.official_link ? '<a href="' + t.official_link + '" target="_blank" rel="noopener" class="btn btn-secondary">Official Site</a>' : '') +
          '</div>' +
          '<div class="desc-section"><h2>Overview</h2><p>' + (t.short_description || '') + '</p></div>' +
          videoHTML +
          '<div class="desc-section"><h2>Detailed Review</h2><p>' + longDesc.replace(/\n/g, '<br>') + '</p></div>';
      } catch (err) {
        content.innerHTML = '<div class="error-msg">Could not load tool details: ' + err.message + '<br><a href="/" style="color:#818cf8">← Back to all tools</a></div>';
      }
    }

    async function loadAd() {
      try {
        const res = await fetch('/.netlify/functions/get-ads');
        const ads = await res.json();
        const ad = ads.find(a => a.slot === 'tool_detail_sidebar' && a.is_active && a.ad_content);
        if (ad) {
          const el = document.getElementById('ad-detail');
          el.innerHTML = ad.ad_content;
          el.style.display = 'block';
        }
      } catch (e) {}
    }
  </script>
</body>
</html>
