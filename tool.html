<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... — AI Tools Findr</title>
    <meta name="description" content="Detailed review and information about this AI tool.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://aitoolsfindr.com/tool.html">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a2e;--t1:#f0f0f5;--t2:#a0a0b8;--t3:#6a6a82;--ac:#7c3aed;--acl:#a78bfa;--acg:rgba(124,58,237,0.3);--g1:linear-gradient(135deg,#7c3aed,#2563eb);--bd:#2a2a40;--f:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
        html{scroll-behavior:smooth}
        body{font-family:var(--f);background:var(--bg);color:var(--t1);line-height:1.7;-webkit-font-smoothing:antialiased}
        a{color:var(--acl);text-decoration:none}a:hover{color:#c4b5fd}

        .back{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;color:var(--t2);font-size:.95rem;transition:color .2s}
        .back:hover{color:var(--t1)}
        .container{max-width:900px;margin:0 auto;padding:20px}
        .tool-header{text-align:center;padding:40px 20px;background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.12),transparent 60%);border-bottom:1px solid var(--bd);margin-bottom:40px}
        .tool-emoji{font-size:4rem;margin-bottom:16px}
        .tool-header h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
        .tool-meta{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:12px}
        .tool-meta span{font-size:.85rem;padding:6px 16px;border-radius:20px;background:var(--bg3);border:1px solid var(--bd);color:var(--t2)}
        .tool-meta .cat{color:var(--acl);border-color:rgba(124,58,237,.3)}
        .tool-meta .ft{color:#fbbf24;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.08)}

        .tool-body{padding:0 20px 40px}
        .tool-desc{font-size:1.05rem;color:var(--t2);line-height:1.9;margin-bottom:30px}
        .tool-desc p{margin-bottom:16px}
        .tool-actions{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:40px}
        .btn-main{padding:16px 36px;border-radius:12px;background:var(--g1);color:#fff;font-weight:700;font-size:1.1rem;text-align:center;transition:all .2s;display:inline-block}
        .btn-main:hover{transform:scale(1.03);box-shadow:0 6px 30px var(--acg);color:#fff}
        .btn-sec{padding:16px 30px;border-radius:12px;border:1px solid var(--bd);color:var(--t2);font-size:1rem;display:inline-block;transition:all .2s}
        .btn-sec:hover{border-color:var(--ac);color:var(--t1)}

        .video-section{margin-bottom:40px}
        .video-section h2{font-size:1.4rem;font-weight:700;margin-bottom:16px;color:var(--t1)}
        .video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;border:1px solid var(--bd);background:var(--bg3)}
        .video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}

        .ad-slot{background:var(--bg2);border:1px dashed var(--bd);border-radius:12px;padding:20px;text-align:center;margin:30px 0;min-height:90px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:.85rem}
        .ad-slot a{color:inherit}
        .ad-slot img{max-width:100%;height:auto;border-radius:8px}

        .ld{text-align:center;padding:100px 20px;color:var(--t3)}
        .sp{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
        @keyframes spin{to{transform:rotate(360deg)}}

        footer{text-align:center;padding:40px 20px;border-top:1px solid var(--bd);color:var(--t3);font-size:.85rem;margin-top:40px}
        @media(max-width:480px){.tool-actions{flex-direction:column}.container{padding:12px}}
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← Back to All Tools</a>
    </div>

    <div id="content">
        <div class="ld"><div class="sp"></div><p>Loading tool details...</p></div>
    </div>

    <footer>
        <p>&copy; 2026 AI Tools Findr. All rights reserved.</p>
        <p>This site contains referral links. We may earn a commission at no extra cost to you.</p>
    </footer>

    <script>
        async function loadTool() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) { window.location.href = '/'; return; }

            try {
                const res = await fetch(`/.netlify/functions/get-tool?id=${id}`);
                if (!res.ok) { window.location.href = '/'; return; }
                const tool = await res.json();

                // Update page title and meta
                document.title = `${tool.name} — Review & Referral | AI Tools Findr`;
                document.querySelector('meta[name="description"]').content = tool.short_description;
                document.querySelector('link[rel="canonical"]').href = `https://aitoolsfindr.com/tool.html?id=${tool.id}`;

                // Load ad
                let adHtml = '';
                try {
                    const adRes = await fetch('/.netlify/functions/get-ads');
                    const ads = await adRes.json();
                    const sidebarAd = ads.find(a => a.slot === 'tool_detail_sidebar' && a.ad_content);
                    if (sidebarAd && sidebarAd.ad_content) {
                        adHtml = `<div class="ad-slot">${sidebarAd.ad_content}</div>`;
                    }
                } catch(e) {}

                // Build video section
                let videoHtml = '';
                if (tool.video_url) {
                    let embedUrl = tool.video_url;
                    const ytMatch = tool.video_url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
                    if (ytMatch) embedUrl = `https://www.youtube.com/embed/${ytMatch[1]}`;
                    videoHtml = `
                        <div class="video-section">
                            <h2>Watch ${esc(tool.name)} in Action</h2>
                            <div class="video-wrap">
                                <iframe src="${esc(embedUrl)}" title="${esc(tool.name)} video" allowfullscreen loading="lazy"></iframe>
                            </div>
                        </div>`;
                }

                // Build long description
                const longDesc = tool.long_description || tool.description;
                const descParagraphs = longDesc.split('\n').filter(p => p.trim()).map(p => `<p>${esc(p)}</p>`).join('');

                document.getElementById('content').innerHTML = `
                    <div class="tool-header">
                        <div class="tool-emoji">${tool.icon_emoji || '🔧'}</div>
                        <h1>${esc(tool.name)}</h1>
                        <p style="color:var(--t2);font-size:1.1rem;max-width:600px;margin:0 auto">${esc(tool.short_description)}</p>
                        <div class="tool-meta">
                            <span class="cat">${esc(tool.category)}</span>
                            <span>${esc(tool.pricing || 'Freemium')}</span>
                            ${tool.is_featured ? '<span class="ft">⭐ Featured</span>' : ''}
                        </div>
                    </div>
                    <div class="container">
                        <div class="tool-body">
                            <div class="tool-actions">
                                <a href="${esc(tool.referral_link)}" target="_blank" rel="noopener sponsored" class="btn-main">Get ${esc(tool.name)} →</a>
                                ${tool.official_link ? `<a href="${esc(tool.official_link)}" target="_blank" rel="noopener" class="btn-sec">Visit Official Site</a>` : ''}
                            </div>
                            ${videoHtml}
                            <div class="tool-desc">
                                <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:16px;color:var(--t1)">About ${esc(tool.name)}</h2>
                                ${descParagraphs}
                            </div>
                            ${adHtml}
                            <div class="tool-actions" style="justify-content:center;padding-top:20px;border-top:1px solid var(--bd)">
                                <a href="${esc(tool.referral_link)}" target="_blank" rel="noopener sponsored" class="btn-main">Try ${esc(tool.name)} Now →</a>
                            </div>
                        </div>
                    </div>`;
            } catch (error) {
                document.getElementById('content').innerHTML = '<div class="ld"><p>Error loading tool. <a href="/">Go back home</a></p></div>';
            }
        }

        function esc(t) {
            if (!t) return '';
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        loadTool();
    </script>
</body>
</html>
