<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — AI Tools Findr</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
    .login-wrap{display:flex;align-items:center;justify-content:center;height:100vh}
    .login-box{background:#111118;padding:32px;border-radius:12px;border:1px solid #1e1e2e;width:340px;text-align:center}
    .login-box h2{margin-bottom:16px;color:#818cf8}
    input,textarea,select{width:100%;padding:10px;margin-bottom:12px;border:1px solid #333;border-radius:6px;background:#0a0a0f;color:#e0e0e0;font-size:14px}
    textarea{min-height:100px;font-family:monospace}
    button{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600}
    .btn-p{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
    .btn-d{background:#dc2626;color:#fff}
    .btn-s{background:#1e1e2e;color:#e0e0e0;border:1px solid #333}
    .admin{max-width:960px;margin:0 auto;padding:24px 16px;display:none}
    .tabs{display:flex;gap:8px;margin-bottom:20px}
    .tab{padding:10px 20px;border-radius:8px;cursor:pointer;background:#1e1e2e;color:#e0e0e0;border:1px solid #333}
    .tab.active{background:#312e81;border-color:#818cf8;color:#c7d2fe}
    .panel{display:none}
    .panel.active{display:block}
    .card{background:#111118;border:1px solid #1e1e2e;border-radius:8px;padding:16px;margin-bottom:12px}
    .card h3{color:#fff;margin-bottom:8px}
    .card p{color:#888;font-size:13px;margin-bottom:8px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    label{display:block;font-size:13px;color:#aaa;margin-bottom:4px}
    .msg{padding:10px;border-radius:6px;margin-bottom:12px;display:none;font-size:14px}
    .msg.ok{background:#064e3b;color:#a7f3d0;display:block}
    .msg.err{background:#7f1d1d;color:#fca5a5;display:block}
    .form-group{margin-bottom:14px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .check-row{display:flex;gap:16px;align-items:center;margin-bottom:12px}
    .check-row label{margin:0;display:flex;gap:6px;align-items:center;color:#e0e0e0}
    .check-row input{width:auto;margin:0}
    hr{border:none;border-top:1px solid #1e1e2e;margin:20px 0}
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h2>🔐 Admin Login</h2>
    <p style="color:#888;margin-bottom:16px">Enter your admin key to manage tools</p>
    <input type="password" id="keyInput" placeholder="Admin Key">
    <button class="btn-p" onclick="doLogin()" style="width:100%">Login</button>
    <div id="loginMsg" class="msg" style="margin-top:12px"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="adminPanel">
  <h1 style="margin-bottom:16px;color:#818cf8">⚙️ Admin Panel</h1>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('tools')">🔧 Tools</div>
    <div class="tab" onclick="switchTab('ads')">📢 Ads</div>
  </div>

  <!-- ========== TOOLS TAB ========== -->
  <div class="panel active" id="panel-tools">
    <div id="toolMsg" class="msg"></div>
    <div class="card">
      <h3 id="formTitle">➕ Add New Tool</h3>
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group"><label>Tool Name *</label><input id="f_name"></div>
        <div class="form-group"><label>Category *</label><input id="f_category" placeholder="AI Assistants"></div>
      </div>
      <div class="form-group"><label>Short Description *</label><input id="f_short_description" maxlength="300"></div>
      <div class="form-group"><label>Full Description *</label><textarea id="f_description"></textarea></div>
      <div class="form-group"><label>Long Description (for detail page)</label><textarea id="f_long_description" placeholder="Detailed review text..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Referral Link *</label><input id="f_referral_link"></div>
        <div class="form-group"><label>Official Link</label><input id="f_official_link"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Video URL (YouTube)</label><input id="f_video_url" placeholder="https://youtube.com/watch?v=..."></div>
        <div class="form-group"><label>Icon Emoji</label><input id="f_icon_emoji" value="🔧" style="width:60px"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Pricing</label><input id="f_pricing" value="Freemium"></div>
        <div class="form-group"><label>Sort Order</label><input id="f_sort_order" type="number" value="10"></div>
      </div>
      <div class="check-row">
        <label><input type="checkbox" id="f_is_featured"> Featured?</label>
        <label><input type="checkbox" id="f_is_active" checked> Active?</label>
      </div>
      <div class="actions">
        <button class="btn-p" onclick="saveTool()">💾 Save Tool</button>
        <button class="btn-s" onclick="resetForm()">Cancel</button>
      </div>
    </div>
    <hr>
    <h3 style="margin-bottom:12px">All Tools</h3>
    <input id="searchTools" placeholder="Search tools..." oninput="renderTools()" style="margin-bottom:12px">
    <div id="toolsList"></div>
  </div>

  <!-- ========== ADS TAB ========== -->
  <div class="panel" id="panel-ads">
    <div id="adMsg" class="msg"></div>
    <p style="color:#888;margin-bottom:16px">Paste your ad HTML (e.g., Google AdSense code, banner image code) into each slot. Leave empty to hide the slot.</p>
    <div id="adsList"></div>
  </div>
</div>

<script>
let KEY = '';
let tools = [];
let ads = [];

// ----- LOGIN -----
function doLogin() {
  KEY = document.getElementById('keyInput').value.trim();
  if (!KEY) return;
  fetch('/.netlify/functions/get-tools')
    .then(r => r.json())
    .then(data => {
      tools = data;
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      renderTools();
      loadAds();
    })
    .catch(() => {
      document.getElementById('loginMsg').className = 'msg err';
      document.getElementById('loginMsg').textContent = 'Could not connect. Try again.';
    });
}
document.getElementById('keyInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ----- TABS -----
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ----- TOOLS -----
function renderTools() {
  const q = (document.getElementById('searchTools').value || '').toLowerCase();
  const filtered = tools.filter(t => t.name.toLowerCase().includes(q) || t.category.toLowerCase().includes(q));
  const el = document.getElementById('toolsList');
  if (filtered.length === 0) { el.innerHTML = '<p style="color:#888">No tools found.</p>'; return; }
  el.innerHTML = filtered.map(t =>
    '<div class="card"><h3>' + (t.icon_emoji||'🔧') + ' ' + t.name +
    (t.is_featured ? ' ⭐' : '') + (!t.is_active ? ' <span style="color:#f87171">(Inactive)</span>' : '') +
    '</h3><p>' + t.category + ' · ' + (t.pricing||'Freemium') + ' · Sort: ' + t.sort_order + '</p>' +
    '<p style="color:#aaa;font-size:12px">' + (t.short_description||'').substring(0,100) + '</p>' +
    '<p style="font-size:11px;color:#666;margin-bottom:6px">Referral: ' + (t.referral_link||'').substring(0,60) + '...</p>' +
    '<div class="actions">' +
    '<button class="btn-s" onclick="editTool(' + t.id + ')">✏️ Edit</button> ' +
    '<button class="btn-d" onclick="deleteTool(' + t.id + ',\'' + t.name.replace(/'/g,"\\'") + '\')">🗑️ Delete</button>' +
    '</div></div>'
  ).join('');
}

function editTool(id) {
  const t = tools.find(x => x.id === id);
  if (!t) return;
  document.getElementById('editId').value = t.id;
  document.getElementById('formTitle').textContent = '✏️ Editing: ' + t.name;
  document.getElementById('f_name').value = t.name || '';
  document.getElementById('f_category').value = t.category || '';
  document.getElementById('f_short_description').value = t.short_description || '';
  document.getElementById('f_description').value = t.description || '';
  document.getElementById('f_long_description').value = t.long_description || '';
  document.getElementById('f_referral_link').value = t.referral_link || '';
  document.getElementById('f_official_link').value = t.official_link || '';
  document.getElementById('f_video_url').value = t.video_url || '';
  document.getElementById('f_icon_emoji').value = t.icon_emoji || '🔧';
  document.getElementById('f_pricing').value = t.pricing || '';
  document.getElementById('f_sort_order').value = t.sort_order || 0;
  document.getElementById('f_is_featured').checked = t.is_featured;
  document.getElementById('f_is_active').checked = t.is_active;
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetForm() {
  document.getElementById('editId').value = '';
  document.getElementById('formTitle').textContent = '➕ Add New Tool';
  ['f_name','f_category','f_short_description','f_description','f_long_description','f_referral_link','f_official_link','f_video_url'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_icon_emoji').value = '🔧';
  document.getElementById('f_pricing').value = 'Freemium';
  document.getElementById('f_sort_order').value = '10';
  document.getElementById('f_is_featured').checked = false;
  document.getElementById('f_is_active').checked = true;
}

async function saveTool() {
  const editId = document.getElementById('editId').value;
  const body = {
    name: document.getElementById('f_name').value,
    category: document.getElementById('f_category').value,
    short_description: document.getElementById('f_short_description').value,
    description: document.getElementById('f_description').value,
    long_description: document.getElementById('f_long_description').value,
    referral_link: document.getElementById('f_referral_link').value,
    official_link: document.getElementById('f_official_link').value,
    video_url: document.getElementById('f_video_url').value,
    icon_emoji: document.getElementById('f_icon_emoji').value,
    pricing: document.getElementById('f_pricing').value,
    sort_order: parseInt(document.getElementById('f_sort_order').value) || 10,
    is_featured: document.getElementById('f_is_featured').checked,
    is_active: document.getElementById('f_is_active').checked
  };
  if (!body.name || !body.category || !body.referral_link) {
    showMsg('toolMsg', 'err', 'Name, Category and Referral Link are required.');
    return;
  }
  const isEdit = !!editId;
  if (isEdit) body.id = parseInt(editId);
  try {
    const res = await fetch('/.netlify/functions/' + (isEdit ? 'update-tool' : 'add-tool'), {
      method: isEdit ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': KEY },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    showMsg('toolMsg', 'ok', isEdit ? 'Tool updated!' : 'Tool added!');
    // refresh list
    const listRes = await fetch('/.netlify/functions/get-tools');
    tools = await listRes.json();
    renderTools();
    resetForm();
  } catch (err) {
    showMsg('toolMsg', 'err', 'Error: ' + err.message);
  }
}

async function deleteTool(id, name) {
  if (!confirm('Delete "' + name + '"?')) return;
  try {
    const res = await fetch('/.netlify/functions/delete-tool', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': KEY },
      body: JSON.stringify({ id })
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Failed'); }
    showMsg('toolMsg', 'ok', '"' + name + '" deleted.');
    tools = tools.filter(t => t.id !== id);
    renderTools();
  } catch (err) {
    showMsg('toolMsg', 'err', 'Error: ' + err.message);
  }
}

// ----- ADS -----
async function loadAds() {
  try {
    const res = await fetch('/.netlify/functions/get-ads');
    ads = await res.json();
    renderAds();
  } catch (e) {
    document.getElementById('adsList').innerHTML = '<p style="color:#f87171">Could not load ads.</p>';
  }
}

const slotLabels = {
  'home_top': '🏠 Homepage — Top Banner',
  'home_middle': '🏠 Homepage — Middle Banner',
  'home_bottom': '🏠 Homepage — Bottom Banner',
  'tool_detail_sidebar': '📄 Tool Detail Page — Sidebar'
};

function renderAds() {
  const el = document.getElementById('adsList');
  el.innerHTML = ads.map(ad =>
    '<div class="card">' +
    '<h3>' + (slotLabels[ad.slot] || ad.slot) + '</h3>' +
    '<p style="font-size:12px;color:#666">Slot ID: ' + ad.slot + ' · ' + (ad.is_active ? '🟢 Active' : '🔴 Inactive') + '</p>' +
    '<div class="form-group" style="margin-top:10px"><label>Ad HTML Content</label>' +
    '<textarea id="ad_content_' + ad.id + '" style="min-height:120px">' + (ad.ad_content || '').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</textarea></div>' +
    '<div class="check-row"><label><input type="checkbox" id="ad_active_' + ad.id + '"' + (ad.is_active ? ' checked' : '') + '> Active</label></div>' +
    '<button class="btn-p" onclick="saveAd(' + ad.id + ',\'' + ad.slot + '\')">💾 Save Ad</button>' +
    '</div>'
  ).join('');
}

async function saveAd(id, slot) {
  const content = document.getElementById('ad_content_' + id).value;
  const is_active = document.getElementById('ad_active_' + id).checked;
  try {
    const res = await fetch('/.netlify/functions/save-ad', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': KEY },
      body: JSON.stringify({ id, slot, ad_content: content, is_active })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    showMsg('adMsg', 'ok', 'Ad slot "' + slot + '" saved!');
    loadAds();
  } catch (err) {
    showMsg('adMsg', 'err', 'Error: ' + err.message);
  }
}

function showMsg(elId, type, text) {
  const el = document.getElementById(elId);
  el.className = 'msg ' + (type === 'ok' ? 'ok' : 'err');
  el.textContent = text;
  setTimeout(() => { el.style.display = 'none'; el.className = 'msg'; }, 5000);
}
</script>
</body>
</html>
